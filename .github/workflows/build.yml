name: Build & Release Electron App

# Triggered by pushing a version tag (e.g. `git tag v2.1.4 && git push --tags`).
# Each runner builds its own OS target and publishes straight to the GitHub
# Release associated with the tag — including the latest.yml / latest-mac.yml
# manifests and .blockmap files that electron-updater needs.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for debugging without creating a new tag
  workflow_dispatch:

permissions:
  contents: write  # needed so electron-builder can create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Strict — if package-lock.json is out of sync, fail loudly. The
        # earlier `|| npm install` fallback silently regenerated the lock
        # in CI which defeated the lockfile's purpose and let drift land
        # in release builds.
        run: npm ci

      # Build BOTH mac archs in a single invocation so latest-mac.yml
      # references both DMGs. Separate runs would overwrite the manifest.
      - name: Build & publish (macOS)
        if: matrix.target == 'mac'
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing + notarization:
          #   CSC_LINK = base64-encoded .p12 cert (from Apple Developer Program)
          #   CSC_KEY_PASSWORD = cert password
          #   APPLE_ID = Apple ID email (for notarization)
          #   APPLE_APP_SPECIFIC_PASSWORD = app-specific password (appleid.apple.com)
          #   APPLE_TEAM_ID = Team ID from developer.apple.com/account
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build & publish (Windows)
        if: matrix.target == 'win'
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code signing via Azure Trusted Signing:
          #   CSC_LINK = .pfx cert path or base64
          #   CSC_KEY_PASSWORD = cert password
          # Without a cert, unsigned EXEs trigger SmartScreen on first-run.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Show dist contents
        shell: bash
        run: ls -lh dist/ || true
