services:
  api:
    # Local dev: build from Dockerfile.  In CI deploy the `image:` line
    # takes precedence (GHCR tag pushed by the deploy workflow).
    build: .
    # image: ghcr.io/${GITHUB_REPOSITORY:-user/repo}-api:main
    container_name: proctor-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOADTEST_SECRET=${LOADTEST_SECRET:-}
    depends_on:
      - redis
    volumes:
      - ./screenshots:/app/screenshots
      - ./logs:/data/logs
    deploy:
      resources:
        limits:
          memory: 1000m       # 2 async workers; ~500 MB each
          cpus: "1.5"         # leave 0.5 CPU for Caddy + Redis on 2GB droplet
    memswap_limit: 1000m      # don't let them silently spill into swap
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: proctor-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./app/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"
    memswap_limit: 128m
    depends_on:
      # Wait for the API healthcheck to pass before Caddy starts —
      # otherwise the proxy boots first and serves 502 to anyone
      # hitting the site during the ~15 s API warm-up after deploy.
      api:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: proctor-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 96m
          cpus: "0.2"
    memswap_limit: 96m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  caddy_data:
  caddy_config:
