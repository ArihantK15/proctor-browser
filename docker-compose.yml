services:
  api:
    build: .
    container_name: proctor-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOADTEST_SECRET=${LOADTEST_SECRET:-}
    depends_on:
      - redis
    volumes:
      - ./screenshots:/app/screenshots
      - ./logs:/data/logs
    mem_limit: 1200m       # 1 async worker; leaves ~600 MB for Caddy + Redis + OS
    memswap_limit: 1200m   # don't let it silently spill into swap
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: proctor-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./app/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m
    memswap_limit: 128m
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: proctor-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped
    expose:
      - "6379"
    mem_limit: 96m
    memswap_limit: 96m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  caddy_data:
  caddy_config:
