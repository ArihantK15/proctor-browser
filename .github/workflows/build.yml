name: Build & Release Electron App

# Triggered by pushing a version tag (e.g. `git tag v2.1.4 && git push --tags`).
# Each runner builds its own OS target and publishes straight to the GitHub
# Release associated with the tag — including the latest.yml / latest-mac.yml
# manifests and .blockmap files that electron-updater needs.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for debugging without creating a new tag
  workflow_dispatch:

permissions:
  contents: write  # needed so electron-builder can create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      # Build BOTH mac archs in a single invocation so latest-mac.yml
      # references both DMGs. Separate runs would overwrite the manifest.
      - name: Build & publish (macOS)
        if: matrix.target == 'mac'
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing for now — when you buy a cert, add:
          #   CSC_LINK, CSC_KEY_PASSWORD (macOS)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build & publish (Windows)
        if: matrix.target == 'win'
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Windows cert yet — unsigned binaries will trigger SmartScreen
          # on first-run until you add Azure Trusted Signing.

      - name: Show dist contents
        shell: bash
        run: ls -lh dist/ || true
