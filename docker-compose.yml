services:
  api:
    build: .
    container_name: proctor-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./screenshots:/app/screenshots
      - ./questions.json:/app/questions.json
      - ./logs:/data/logs
    mem_limit: 1400m       # leave ~600 MB for Caddy + OS on a 2 GB droplet
    memswap_limit: 1400m   # don't let it silently spill into swap
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: proctor-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m
    memswap_limit: 128m
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
